<script>
  const galleryPhotos = [
    { src: 'photos/photo-01.jpg', alt: 'Portrait in dappled forest light' },
    { src: 'photos/photo-02.jpg', alt: 'Maternity portrait with flower crown' },
    { src: 'photos/photo-03.jpg', alt: 'Diner interior with lit EAT sign' },
    { src: 'photos/photo-04.jpg', alt: 'Groomsmen laughing together' },
    { src: 'photos/photo-05.jpg', alt: 'Bride laughing against a yellow wall' },
    { src: 'photos/photo-06.jpg', alt: 'Bride among columns' },
    { src: 'photos/photo-07.jpg', alt: 'Close-up portrait of a child laughing' },
    { src: 'photos/photo-08.jpg', alt: 'Back portrait with musical note tattoos' },
    { src: 'photos/photo-09.jpg', alt: 'Woman leaping with a pink balloon' },
    { src: 'photos/photo-10.jpg', alt: 'Crowd marching beneath a freeway overpass' },
    { src: 'photos/photo-11.jpg', alt: 'Red and white tulips against a cloudy sky' },
    { src: 'photos/photo-12.jpg', alt: 'Rusted vintage car abandoned in a mountain field' },
    { src: 'photos/photo-13.jpg', alt: 'Bethesda Fountain angel statue in Central Park' },
    { src: 'photos/photo-14.jpg', alt: 'Rose garden with fountain and domed building' },
    { src: 'photos/photo-15.jpg', alt: 'Close-up of colorful blown glass art installation' },
    { src: 'photos/photo-16.jpg', alt: 'Pink dahlias backlit by sunlight' },
    { src: 'photos/photo-17.jpg', alt: 'Desert rock formations under a dramatic streaked sky' },
    { src: 'photos/photo-18.jpg', alt: 'Narrow shopping alley in Japan at night' },
    { src: 'photos/photo-19.jpg', alt: 'Canal running between buildings in Japan' },
    { src: 'photos/photo-20.jpg', alt: 'Crowded neon-lit street in Japan at night' },
    { src: 'photos/photo-21.jpg', alt: 'Grand brick building with turrets and courtyard' },
    { src: 'photos/photo-22.jpg', alt: 'Colorful blown glass ceiling installation' },
    { src: 'photos/photo-23.jpg', alt: 'Crowded shopping street in Japan' }
  ];

  let currentPhotoIndex = 0;
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');

  function openLightbox(index) {
    currentPhotoIndex = index;
    showPhoto();
    lightbox.classList.add('open');
    lightbox.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    lightbox.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }

  function showPhoto() {
    const photo = galleryPhotos[currentPhotoIndex];
    lightboxImg.src = photo.src;
    lightboxImg.alt = photo.alt;
  }

  function nextPhoto() {
    currentPhotoIndex = (currentPhotoIndex + 1) % galleryPhotos.length;
    showPhoto();
  }

  function prevPhoto() {
    currentPhotoIndex = (currentPhotoIndex - 1 + galleryPhotos.length) % galleryPhotos.length;
    showPhoto();
  }

  document.querySelectorAll('.photo-thumb').forEach(btn => {
    btn.addEventListener('click', () => openLightbox(parseInt(btn.dataset.index, 10)));
  });

  document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
  document.getElementById('lightboxNext').addEventListener('click', nextPhoto);
  document.getElementById('lightboxPrev').addEventListener('click', prevPhoto);

  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') nextPhoto();
    if (e.key === 'ArrowLeft') prevPhoto();
  });
</script>
